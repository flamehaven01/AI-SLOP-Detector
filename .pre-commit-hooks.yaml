- id: slop-detector
  name: AI-SLOP Detector
  description: >
    Structural risk scanner for AI-assisted code.
    Fails if any file reaches CRITICAL_DEFICIT (deficit_score >= 70)
    or has 3+ critical patterns. Uses hard CI gate mode.
  entry: python -m slop_detector.cli
  language: python
  types: [python]
  pass_filenames: false
  args: ['--project', '.', '--ci-mode', 'hard']
  require_serial: false

- id: slop-detector-warn
  name: AI-SLOP Detector (Warn Only)
  description: >
    Informational scan — reports findings but never fails the build.
    Use for visibility without blocking commits.
  entry: python -m slop_detector.cli
  language: python
  types: [python]
  pass_filenames: false
  args: ['--project', '.', '--ci-mode', 'soft']
  require_serial: false

- id: slop-detector-patterns
  name: AI-SLOP Detector (Patterns Only)
  description: >
    Fast check — pattern detection only, skips LDR/ICR/DDC metrics.
    Fails if deficit_score exceeds 50 on any changed file.
  entry: python -m slop_detector.cli
  language: python
  types: [python]
  pass_filenames: true
  args: ['--patterns-only', '--fail-threshold', '50']
  require_serial: false
