# .slopconfig.yaml — ai-slop-detector project self-scan configuration
# Used by: slop-detector CLI, SIDRCE SaaS inspect, CI gate

patterns:
  disabled: []
  god_function:
    complexity_threshold: 10
    lines_threshold: 50
    domain_overrides:
      # AST pattern matcher methods — inherently multi-branch by design.
      # Each check_node handles every possible AST variant of a code pattern.
      - function_pattern: "check_node"
        complexity_threshold: 30
        lines_threshold: 200
      # Core metric calculators — handle many file-type variants (stubs, ABCs,
      # packaging inits, config files). Complexity is inherent to the domain.
      - function_pattern: "calculate"
        complexity_threshold: 30
        lines_threshold: 200
      - function_pattern: "_is_abc_interface"
        complexity_threshold: 30
        lines_threshold: 200
      - function_pattern: "_count_empty_function_lines"
        complexity_threshold: 30
        lines_threshold: 200
      # Pattern check() methods — multi-dispatch over AST node types
      - function_pattern: "check"
        complexity_threshold: 20
        lines_threshold: 150
  nested_complexity:
    depth_threshold: 4
    cc_threshold: 5
    domain_overrides:
      # AST pattern matcher check_node — dispatches over every AST node variant;
      # nesting depth and branch count are inherent to exhaustive AST traversal.
      - function_pattern: "check_node"
        depth_threshold: 10
        cc_threshold: 30
      # Core metric calculators — multi-variant file classification requires
      # deep conditional trees by design.
      - function_pattern: "calculate"
        depth_threshold: 8
        cc_threshold: 20
      - function_pattern: "_is_abc_interface"
        depth_threshold: 8
        cc_threshold: 20
      - function_pattern: "_count_empty_function_lines"
        depth_threshold: 8
        cc_threshold: 20
      # Pattern check() — multi-dispatch over AST node types
      - function_pattern: "check"
        depth_threshold: 6
        cc_threshold: 15
      # CLI render/display helpers — table layout logic requires nested conditionals
      - function_pattern: "_render_*"
        depth_threshold: 6
        cc_threshold: 12
      - function_pattern: "_display_*"
        depth_threshold: 6
        cc_threshold: 12
      # LDR metric helpers — file-type classification is inherently branch-heavy
      - function_pattern: "_classify_*"
        depth_threshold: 6
        cc_threshold: 12

weights:
  ldr: 0.40
  inflation: 0.30
  ddc: 0.30

ignore:
  # -----------------------------------------------------------------------
  # RULE-0 NOTE (SIDRCE SaaS / AI-Slop-Detector):
  #   This project ships intentional slop fixtures in tests/corpus/ and
  #   standard Python packaging __init__.py files. Both are FALSE POSITIVES
  #   under Rule-0 (Anti-Slop Scan). Always pass --config .slopconfig.yaml
  #   when invoking SIDRCE or slop-detector on this project root.
  #   Command: python -m app.cli inspect . --config .slopconfig.yaml
  #            slop-detector --project src/ --config .slopconfig.yaml
  # -----------------------------------------------------------------------

  # Python boilerplate (LDR=1.00 by design — empty packaging init files)
  - "**/__init__.py"
  # Test suite — tests/corpus/ contains intentional high-deficit fixtures
  # designed to be caught by the tool; Rule-0 would false-positive on them
  - "tests/**"
  - "**/*_test.py"
  - "**/test_*.py"
  # Type stubs
  - "**/*.pyi"
  # Virtual environments
  - "**/.venv/**"
  - ".venv/**"
  - "**/venv/**"
  - "venv/**"
  - "**/site-packages/**"
  # Build artifacts
  - "**/node_modules/**"
  - "**/__pycache__/**"
  - "build/**"
  - "dist/**"
  - "htmlcov/**"
  # VS Code extension (TypeScript/Node, not Python)
  - "vscode-extension/**"
