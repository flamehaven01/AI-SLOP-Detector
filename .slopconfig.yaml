# .slopconfig.yaml — ai-slop-detector project self-scan configuration
# Used by: slop-detector CLI, SIDRCE SaaS inspect, CI gate

patterns:
  disabled:
    # function_clone_cluster: all BasePattern subclasses share an identical
    # check() / check_node() signature by design (visitor/strategy pattern).
    # AST JSD < 0.05 similarity is architectural, not fragmentation slop.
    - function_clone_cluster
  nested_complexity:
    depth_threshold: 4
    cc_threshold: 5
    domain_overrides:
      # AST pattern matcher check_node — dispatches over every AST node variant;
      # nesting depth and branch count are inherent to exhaustive AST traversal.
      - function_pattern: "check_node"
        depth_threshold: 10
        cc_threshold: 30
      # Core metric calculators — multi-variant file classification requires
      # deep conditional trees by design.
      - function_pattern: "calculate"
        depth_threshold: 8
        cc_threshold: 20
      - function_pattern: "_is_abc_interface"
        depth_threshold: 8
        cc_threshold: 20
      - function_pattern: "_count_empty_function_lines"
        depth_threshold: 8
        cc_threshold: 20
      # Pattern check() — multi-dispatch over AST node types
      - function_pattern: "check"
        depth_threshold: 6
        cc_threshold: 15
      # CLI render/display helpers — table layout logic requires nested conditionals
      - function_pattern: "_render_*"
        depth_threshold: 6
        cc_threshold: 12
      - function_pattern: "_display_*"
        depth_threshold: 6
        cc_threshold: 12
      # LDR metric helpers — file-type classification is inherently branch-heavy
      - function_pattern: "_classify_*"
        depth_threshold: 6
        cc_threshold: 12
      # Import guard helpers — scan AST for try/except ImportError guards;
      # handler classification requires nested AST inspection by design.
      - function_pattern: "_handler_is_import_guard"
        depth_threshold: 6
        cc_threshold: 12
      - function_pattern: "_collect_import_guard_lines"
        depth_threshold: 6
        cc_threshold: 12
      # Pattern runner + ignore-decorator parser — orchestration over
      # multi-pattern dispatch and decorator-tree traversal.
      - function_pattern: "_run_patterns"
        depth_threshold: 6
        cc_threshold: 15
      - function_pattern: "_collect_ignored_functions"
        depth_threshold: 6
        cc_threshold: 12
      - function_pattern: "_parse_slop_ignore_decorator"
        depth_threshold: 6
        cc_threshold: 12
      # Jargon/complexity scanners — walk AST call trees and scope trees;
      # depth is inherent to walking nested call/scope hierarchies.
      - function_pattern: "_scan_jargon"
        depth_threshold: 8
        cc_threshold: 20
      - function_pattern: "_calculate_avg_complexity"
        depth_threshold: 6
        cc_threshold: 12
      - function_pattern: "_build_function_scopes"
        depth_threshold: 6
        cc_threshold: 12
      # Presence-check helpers (error handling / logging detection) —
      # walk AST to classify handler blocks; nesting is structural.
      - function_pattern: "_has_error_handling"
        depth_threshold: 6
        cc_threshold: 12
      - function_pattern: "_has_logging"
        depth_threshold: 6
        cc_threshold: 12
      # JS/TS AST walkers — recursive traversal over heterogeneous node types.
      - function_pattern: "_walk_inline_patterns"
        depth_threshold: 8
        cc_threshold: 20
      - function_pattern: "_walk"
        depth_threshold: 8
        cc_threshold: 20
      # Grade assignment — multi-threshold classifier is branch-heavy by design.
      - function_pattern: "_assign_grade"
        depth_threshold: 8
        cc_threshold: 20
      # Python language analyzer — AST function-node walker; visits every
      # function attribute (args, decorators, body, return annotation).
      - function_pattern: "_analyze_function"
        depth_threshold: 8
        cc_threshold: 20
      # Import usage walker — must track every import alias vs. all name
      # references in the file; nested scope + shadowing checks are structural.
      - function_pattern: "_detect_unused_imports"
        depth_threshold: 8
        cc_threshold: 20
      # Docstring inflation metric — must walk both function and module scopes
      # to count implementation vs. comment lines; depth reflects two-pass analysis.
      - function_pattern: "_count_implementation_lines"
        depth_threshold: 8
        cc_threshold: 20
      - function_pattern: "_count_module_implementation_lines"
        depth_threshold: 8
        cc_threshold: 20
      # DocstringInflationAnalyzer.analyze — orchestrates per-function + per-module
      # pass; multi-stage aggregation is inherent to the metric design.
      - function_pattern: "analyze"
        depth_threshold: 8
        cc_threshold: 20
      # LEDA self-calibrator: 4D grid search — n nested loops for n-dimensional
      # simplex traversal; complexity scales with dimension count by design.
      - function_pattern: "_grid_search"
        depth_threshold: 6
        cc_threshold: 10
  god_function:
    complexity_threshold: 10
    lines_threshold: 50
    domain_overrides:
      # AST pattern matcher methods — inherently multi-branch by design.
      # Each check_node handles every possible AST variant of a code pattern.
      - function_pattern: "check_node"
        complexity_threshold: 30
        lines_threshold: 200
      # Core metric calculators — handle many file-type variants (stubs, ABCs,
      # packaging inits, config files). Complexity is inherent to the domain.
      - function_pattern: "calculate"
        complexity_threshold: 30
        lines_threshold: 200
      - function_pattern: "_is_abc_interface"
        complexity_threshold: 30
        lines_threshold: 200
      - function_pattern: "_count_empty_function_lines"
        complexity_threshold: 30
        lines_threshold: 200
      # Pattern check() methods — multi-dispatch over AST node types
      - function_pattern: "check"
        complexity_threshold: 20
        lines_threshold: 150
      # Python language analyzer and docstring metric (see nested_complexity above)
      - function_pattern: "_analyze_function"
        complexity_threshold: 20
        lines_threshold: 80
      - function_pattern: "_detect_unused_imports"
        complexity_threshold: 20
        lines_threshold: 60
      - function_pattern: "_count_implementation_lines"
        complexity_threshold: 25
        lines_threshold: 100
      - function_pattern: "_count_module_implementation_lines"
        complexity_threshold: 20
        lines_threshold: 80
      - function_pattern: "analyze"
        complexity_threshold: 20
        lines_threshold: 100
      # ML pipeline methods — experimental training orchestration;
      # training loops are inherently multi-stage by design.
      - function_pattern: "run"
        complexity_threshold: 25
        lines_threshold: 150
      - function_pattern: "run_on_real_data"
        complexity_threshold: 20
        lines_threshold: 120
      - function_pattern: "_train_from_samples"
        complexity_threshold: 20
        lines_threshold: 120
      - function_pattern: "_build_dataset"
        complexity_threshold: 20
        lines_threshold: 120
      - function_pattern: "_extract_features"
        complexity_threshold: 20
        lines_threshold: 100
      # LEDA self-calibrator orchestrator — coordinates event loading, grid search,
      # confidence-gap gating, and result assembly; orchestrator pattern is inherently multi-stage.
      - function_pattern: "calibrate"
        complexity_threshold: 15
        lines_threshold: 100
      # YAML comment-preserving in-place updater — must match/replace each of the 4
      # weight keys individually via separate regex passes to avoid destroying comments.
      - function_pattern: "apply_to_config"
        complexity_threshold: 15
        lines_threshold: 70

weights:
  ldr: 0.1
  inflation: 0.1
  ddc: 0.45
  purity: 0.35

ignore:
  # -----------------------------------------------------------------------
  # RULE-0 NOTE (SIDRCE SaaS / AI-Slop-Detector):
  #   This project ships intentional slop fixtures in tests/corpus/ and
  #   standard Python packaging __init__.py files. Both are FALSE POSITIVES
  #   under Rule-0 (Anti-Slop Scan). Always pass --config .slopconfig.yaml
  #   when invoking SIDRCE or slop-detector on this project root.
  #   Command: python -m app.cli inspect . --config .slopconfig.yaml
  #            slop-detector --project src/ --config .slopconfig.yaml
  # -----------------------------------------------------------------------

  # Python boilerplate (LDR=1.00 by design — empty packaging init files)
  - "**/__init__.py"
  # Test suite — tests/corpus/ contains intentional high-deficit fixtures
  # designed to be caught by the tool; Rule-0 would false-positive on them
  - "tests/**"
  - "**/*_test.py"
  - "**/test_*.py"
  # Type stubs
  - "**/*.pyi"
  # Virtual environments
  - "**/.venv/**"
  - ".venv/**"
  - "**/venv/**"
  - "venv/**"
  - "**/site-packages/**"
  # Build artifacts
  - "**/node_modules/**"
  - "**/__pycache__/**"
  - "build/**"
  - "dist/**"
  - "htmlcov/**"
  # VS Code extension (TypeScript/Node, not Python)
  - "vscode-extension/**"
